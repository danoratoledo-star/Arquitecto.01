<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquitecto Hitoshi Abe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 90%;
            max-width: 350px; /* Tamaño ideal y compacto */
            margin: 0 auto;   /* Esto fuerza el centrado horizontal absoluto */
            padding: 10px;
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;   /* Evita espacios fantasmas abajo del video */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <video controls preload="metadata" playsinline>
            <source src="Arquitecto.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
